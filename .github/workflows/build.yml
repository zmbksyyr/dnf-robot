name: Build and Release Binaries

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'robot-go/**'
      - 'tools/deploy-launcher/**'

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: latest-release
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install MinGW and UPX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64 upx-ucl

      - name: Build bin/robot (linux/amd64)
        run: |
          cd robot-go
          go mod download
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../bin/robot ./cmd/robot

      - name: Build bin/部署.exe (windows/amd64)
        run: |
          cd tools/deploy-launcher
          go mod download
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc go build -trimpath -ldflags="-s -w -H windowsgui" -o ../../bin/部署.exe .
          if command -v upx &> /dev/null; then
            upx --best --lzma ../../bin/部署.exe || true
          else
            echo "UPX not found, skipping compression"
          fi

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git tag -f latest "$GITHUB_SHA"
          git push -f origin refs/tags/latest

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest Build" \
              --notes "Automated build for ${GITHUB_SHA}" \
              --target "$GITHUB_SHA"
          else
            gh release create latest \
              --title "Latest Build" \
              --notes "Automated build for ${GITHUB_SHA}" \
              --target "$GITHUB_SHA"
          fi

          gh release view latest --json assets --jq '.assets[].name' |
            while IFS= read -r asset; do
              if [ -n "$asset" ]; then
                gh release delete-asset latest "$asset" -y
              fi
            done

          gh release upload latest bin/robot "bin/部署.exe" --clobber

      - name: Delete old releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release list --limit 100 --json tagName --jq '.[].tagName | select(. != "latest")' |
            while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                gh release delete "$tag" -y --cleanup-tag
              fi
            done
